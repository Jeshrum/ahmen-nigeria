            },
            colors: {
              glass: {

                surface: 'var(--glass-surface-color)',

              }

    <style>
      /* Hide scrollbar */
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      
      :root {
        /* Light Mode Defaults */
        --bg-gradient: linear-gradient(135deg, #f1f5f9 0%, #cbd5e1 100%);
        --text-primary: #0f172a;
        --glass-bg: rgba(255, 255, 255, 0.65);
        --glass-panel-bg: rgba(255, 255, 255, 0.85);
        --glass-border: rgba(255, 255, 255, 0.6);
        --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.08);
        --glass-input-bg: rgba(0, 0, 0, 0.05);
        --glass-input-border: rgba(0, 0, 0, 0.1);
        --glass-input-text: #0f172a;
        
        --glass-border-color: rgba(0, 0, 0, 0.05);
        --glass-surface-color: rgba(255, 255, 255, 0.5);
        --glass-highlight-color: rgba(255, 255, 255, 0.8);
        --glass-shadow-val: 0 8px 32px 0 rgba(0, 0, 0, 0.1);
      }

      .dark {
        /* Dark Mode Override */
        --bg-gradient: radial-gradient(circle at 50% 0%, #1e293b 0%, #0f172a 100%);
        --text-primary: #f8fafc;
        --glass-bg: rgba(30, 41, 59, 0.4);
        --glass-panel-bg: rgba(15, 23, 42, 0.6);
        --glass-border: rgba(255, 255, 255, 0.08);
        --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        --glass-input-bg: rgba(0, 0, 0, 0.2);
        --glass-input-border: rgba(255, 255, 255, 0.1);
        --glass-input-text: #ffffff;

        --glass-border-color: rgba(255, 255, 255, 0.1);
        --glass-surface-color: rgba(255, 255, 255, 0.05);
        --glass-highlight-color: rgba(255, 255, 255, 0.1);
        --glass-shadow-val: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
      }

      body {
        -webkit-tap-highlight-color: transparent;
        background: var(--bg-gradient);
        background-attachment: fixed;
        color: var(--text-primary);
        transition: background 0.3s ease, color 0.3s ease;
      }

      /* Glassmorphism Utilities */
      .glass {
        background: rgba(255, 255, 255, 0.2); 
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid var(--glass-border);
      }
      .dark .glass {
        background: rgba(255, 255, 255, 0.03);
      }
      
      .glass-card {
        background: var(--glass-bg);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--glass-border);
        box-shadow: var(--glass-shadow);
      }

      .glass-panel {
        background: var(--glass-panel-bg);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border-top: 1px solid var(--glass-border);
      }

      .glass-input {
        background: var(--glass-input-bg);
        border: 1px solid var(--glass-input-border);
        color: var(--glass-input-text);
      }
      .glass-input:focus {
        border-color: rgba(16, 185, 129, 0.5); /* Emerald tint on focus */
        outline: none;
      }
      
      .glass-input::placeholder {
        color: gray;
      }
    </style>
